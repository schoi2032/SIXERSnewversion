<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sixers - Fun Facts & Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <h1>Chadwick International Sixers</h1>
        </div>

        <p class="subtitle">Fun Facts & Simulations 🎮</p>
    </header>


    <div id="nav"></div>

    <div class="container">

        <!-- Did You Know Section -->
        <section class="section">
            <h2 class="section-title"><i class="fas fa-question-circle"></i> Did You Know?</h2>
            <div class="comedy-container">
                <p class="joke" id="fact-display">Loading amazing facts...</p>
            </div>
        </section>

        <!-- Simulations Section -->
        <section class="section" style="margin-top: 30px;">
            <h2 class="section-title"><i class="fas fa-gamepad"></i> Mini Simulations</h2>

            <div class="simulations-grid">

                <!-- Gravity Box -->
                <div class="card simulation-card">
                    <h3><i class="fas fa-arrow-down"></i> Gravity Box</h3>
                    <p>Click to add bouncing balls!</p>
                    <canvas id="gravityCanvas" width="300" height="200"></canvas>
                    <div class="sim-controls">
                        <button id="clearBallsBtn" class="read-more">Clear Balls</button>
                    </div>
                </div>

                <!-- Click Speed Test -->
                <div class="card simulation-card">
                    <h3><i class="fas fa-mouse-pointer"></i> Click Speed Test</h3>
                    <p>How many times can you click in 10s?</p>
                    <div class="click-test-area">
                        <div id="clickScore">Score: 0</div>
                        <div id="clickTimer">Time: 10s</div>
                        <button id="clickBtn" class="read-more">Start Clicking!</button>
                    </div>
                </div>

                <!-- Color Matcher (Simple Reaction) -->
                <div class="card simulation-card">
                    <h3><i class="fas fa-palette"></i> Color Reactor</h3>
                    <p>Click when the box turns GREEN!</p>
                    <div id="reactionBox" class="reaction-box">Wait...</div>
                    <div id="reactionResult"></div>
                </div>

            </div>
        </section>

    </div>

    <div id="footer"></div>

    <script src="organize.js" setting = "3"></script>
    <script src="simulations.js"></script>
  <script src="script.js"></script>
</body>

</html>
